name: chat_job
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase and auth
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.1.3
  firebase_messaging: ^16.2.0
  firebase_analytics: ^12.3.0
  cloud_functions: ^6.2.0

  # Payment Processing
  flutter_stripe: ^12.6.0

  # UI & Animations
  modal_progress_hud_nsn: ^0.5.1
  cupertino_icons: ^1.0.8
  animated_text_kit: ^4.3.0

  # Image & Media
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  photo_view: ^0.15.0
  extended_image: ^10.0.1

  # utility
  intl: ^0.20.2
  uuid: ^4.5.3
  http: ^1.6.0

  # State Management (optional but recommended)
  provider: ^6.1.5

  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  timeago: ^3.7.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - images/

fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300